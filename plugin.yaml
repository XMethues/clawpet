manifest_version: 1
name: clawchat-pet
version: "0.5.6"
description: "Hermes hooks + shared pet growth + selectable gameplay scenes."
provides_hooks:
  - pre_llm_call
  - pre_tool_call
  - post_tool_call
  - pre_approval_request
  - post_approval_response
  - on_session_end
  - subagent_start
  - subagent_stop
